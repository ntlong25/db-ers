name: dtc_bike
description: "Datbike Telemetry Monitor — giám sát xe điện Datbike qua BLE"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # BLE
  flutter_blue_plus: ^1.32.12

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Background foreground service
  flutter_foreground_task: ^8.0.3

  # Database (Room equivalent)
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.23

  # Charts (MPAndroidChart equivalent)
  fl_chart: ^0.68.0

  # Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # Permissions
  permission_handler: ^11.3.1

  # Share / export
  share_plus: ^9.0.0

  # Audio alarm
  audioplayers: ^6.1.0

  # Utils
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code generation
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
